<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0a1f14"/>

  <!-- Spider web lines radiating from center -->
  <g stroke="#00ff88" stroke-width="0.5" opacity="0.6">
    <!-- Radial lines -->
    <line x1="16" y1="16" x2="16" y2="2"/>
    <line x1="16" y1="16" x2="25.9" y2="8"/>
    <line x1="16" y1="16" x2="30" y2="16"/>
    <line x1="16" y1="16" x2="25.9" y2="24"/>
    <line x1="16" y1="16" x2="16" y2="30"/>
    <line x1="16" y1="16" x2="6.1" y2="24"/>
    <line x1="16" y1="16" x2="2" y2="16"/>
    <line x1="16" y1="16" x2="6.1" y2="8"/>

    <!-- Web rings -->
    <ellipse cx="16" cy="16" rx="4" ry="4"/>
    <ellipse cx="16" cy="16" rx="8" ry="8"/>
    <ellipse cx="16" cy="16" rx="13" ry="13"/>
  </g>

  <!-- Spade symbol in center -->
  <text x="16" y="20" text-anchor="middle" font-size="14" fill="#00ff88" font-family="serif" opacity="0.9">♠</text>
</svg>
